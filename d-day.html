<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 체계 시간</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #2c3e50;
            --input-bg: #ffffff;
            --btn-bg: #eeeeee;
            --primary-color: #e74c3c;
        }
        .dark-mode {
            --bg-color: #1a1a1a;
            --text-color: #e0e0e0;
            --input-bg: #333333;
            --btn-bg: #444444;
        }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
            font-family: 'Pretendard', sans-serif; 
            text-align: center; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 15vh;
            min-height: 100vh;
            margin: 0;
        }
        input { 
            padding: 12px; 
            font-size: 16px;
            width: 80%; 
            max-width: 300px;
            background-color: var(--input-bg);
            color: var(--text-color);
            border: 2px solid #ccc;
            border-radius: 8px;
            margin-bottom: 10px;
            box-sizing: border-box; /* 패딩 포함 크기 계산 */
        }
        button { 
            padding: 15px 30px; 
            font-size: 18px; 
            cursor: pointer; 
            background-color: var(--btn-bg);
            color: var(--text-color);
            border: 1px solid #888;
            border-radius: 8px;
            width: 80%;
            max-width: 300px;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.98); }
        #result { 
            margin-top: 30px; 
            font-size: 32px; 
            font-weight: bold; 
            color: var(--primary-color);
        }
        .mode-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            width: auto;
            padding: 8px 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <button class="mode-toggle" onclick="toggleDarkMode()">다크 모드</button>

    <h2>너 자신을 도우면, 신도 너를 돕는다</h2>
    <p>최종장까지 남은 시간을 계산합니다</p>

    <input type="date" id="targetDate">
    <button onclick="calculateDDay()">돌려</button>

    <div id="result"></div>

    <script>
        function toggleDarkMode() {
            const body = document.body;
            body.classList.toggle('dark-mode');
            const btn = document.querySelector('.mode-toggle');
            btn.innerText = body.classList.contains('dark-mode') ? "라이트 모드" : "다크 모드";
        }

        function calculateDDay() {
            const inputDate = document.getElementById('targetDate').value;
            if (!inputDate) {
                alert("좁은 문으로 들어가라. 날짜를 선택하고 이 기억은 잊으십시오.");
                return;
            }

            const now = new Date();
            const target = new Date(inputDate);
            
            now.setHours(0, 0, 0, 0);
            target.setHours(0, 0, 0, 0);

            const diff = target - now;
            const dDay = Math.ceil(diff / (1000 * 60 * 60 * 24));

            const resultDiv = document.getElementById('result');
            if (dDay > 0) {
                resultDiv.innerText = "D-" + dDay;
            } else if (dDay === 0) {
                resultDiv.innerText = "D-Day! 바로 오늘입니다.";
            } else {
                resultDiv.innerText = "D+" + Math.abs(dDay) + " (이미 지난 날짜입니다)";
            }
        }
    </script>
</body>
</html>
